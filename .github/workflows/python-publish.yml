name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT CODE
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # SETUP PYTHON
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # PREVENT LARGE FILES 🔥
      # =========================
      - name: Fail if large files exist
        run: |
          echo "Checking for large files..."
          if find . -type f -size +50M | grep -q .; then
            echo "❌ Large files detected:"
            find . -type f -size +50M
            exit 1
          fi

      # =========================
      # BUILD PACKAGE
      # =========================
      - name: Build release distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      # =========================
      # CHECK PACKAGE
      # =========================
      - name: Validate distributions
        run: python -m twine check dist/*

      # =========================
      # TEST INSTALL 🔥
      # =========================
      - name: Test install package
        run: |
          pip install dist/*.whl
          python -c "print('Package installed successfully')"

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # =========================
  # PUBLISH TO PYPI
  # =========================
  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/sopotek-quant-system/

    steps:
      # =========================
      # DOWNLOAD ARTIFACT
      # =========================
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      # =========================
      # PUBLISH (TOKEN METHOD)
      # =========================
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
