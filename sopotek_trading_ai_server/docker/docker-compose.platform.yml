services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_SOPOTEK_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_SOPOTEK_WS_BASE_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ./platform.env.example
    environment:
      SOPOTEK_PLATFORM_DATABASE_URL: postgresql+asyncpg://sopotek:sopotek_local@postgres:5432/sopotek_platform
      SOPOTEK_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONPATH: /app/backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sopotek_platform}
      POSTGRES_USER: ${POSTGRES_USER:-sopotek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sopotek_local}
    ports:
      - "5432:5432"
    volumes:
      - sopotek_platform_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: SOPOTEKTRADINGPLATFORM01
    ports:
      - "9092:9092"
    volumes:
      - sopotek_platform_kafka:/bitnami/kafka

volumes:
  sopotek_platform_postgres:
  sopotek_platform_kafka:
