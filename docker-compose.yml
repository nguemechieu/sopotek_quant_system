services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_URL: sqlite:////app/data/sopotek_trading.db
      QT_X11_NO_MITSHM: "1"
      DISPLAY: ${DISPLAY:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    stdin_open: true
    tty: true
    command: python src/main.py

  app-headless:
    build:
      context: .
      dockerfile: Dockerfile
    image: sopotek-trading-ai:latest
    container_name: sopotek_trading_app_headless
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      SOPOTEK_DATABASE_URL: sqlite:////app/data/sopotek_trading.db
      QT_QPA_PLATFORM: offscreen
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./.env:/app/.env:ro
    profiles:
      - headless
    command: python src/main.py
